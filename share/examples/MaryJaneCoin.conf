##
## MaryJaneCoin example configuration file (MaryJaneCoin.conf)
##
## Place in ~/.MaryJaneCoin/MaryJaneCoin.conf and edit as needed.
## Full option reference: ./MaryJaneCoind --help
##

# Run as a daemon, listen for P2P, expose JSON-RPC on localhost
daemon=1
server=1
listen=1

# JSON-RPC credentials — CHANGE THESE before running on a shared machine.
# Generate a strong random password with:
#   bash -c "tr -dc 'a-zA-Z0-9' </dev/urandom | head -c 32; echo"
rpcuser=rpcuser
rpcpassword=CHANGE_ME_STRONG_PASSWORD

# Default ports: 14200 (P2P), 14201 (RPC). Testnet: 25200 / 25201.
rpcport=14201
rpcallowip=127.0.0.1

# Keep a full transaction index (required by the bridge and most block explorers)
txindex=1

# Optional: add a seed node to bootstrap initial peer discovery
# addnode=seeds.maryjanecoin.net
